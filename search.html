<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <title>Search Products</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f4f4f4;
      text-align: center;
    }

    .nav {
      background: #333;
      padding: 10px;
    }

    .nav a {
      color: white;
      margin: 10px;
      text-decoration: none;
      font-weight: bold;
    }

    .container {
      width: 90%;
      max-width: 900px;
      margin: auto;
    }

    h1 {
      color: blue;
      margin-top: 30px;
    }

    input {
      padding: 12px;
      width: 70%;
      max-width: 400px;
      margin-top: 20px;
      border: 1px solid #ccc;
      border-radius: 8px;
      outline: none;
    }

    .result-item {
      background: white;
      padding: 12px;
      margin: 10px auto;
      width: 70%;
      max-width: 400px;
      border-radius: 8px;
      box-shadow: 0 0 8px rgba(0,0,0,0.1);
    }

    .not-found {
      color: red;
      margin-top: 20px;
    }
  </style>

</head>

<body>

  <!-- Navigation -->
  <div class="nav">
    <a href="index.html">Home</a>
    <a href="products.html">Products</a>
    <a href="search.html">Search</a>
    <a href="about.html">About</a>
    <a href="contact.html">Contact</a>
  </div>

  <div class="container">

    <h1>🔍 Search Products</h1>

    <input 
      type="text" 
      id="searchBox" 
      placeholder="এখানে পণ্য খুঁজুন..." 
      onkeyup="searchProduct()"
    >

    <div id="result"></div>

  </div>

  <script>
    const products = [
      "Stylish Dress",
      "Premium T-Shirt",
      "Fashion Bag",
      "Stylish Watch",
      "Shoes Collection"
    ];

    function searchProduct() {
      let input = document.getElementById("searchBox").value.toLowerCase();
      let resultBox = document.getElementById("result");

      let filtered = products.filter(item =>
        item.toLowerCase().includes(input)
      );

      if (input === "") {
        resultBox.innerHTML = "";
        return;
      }

      if (filtered.length === 0) {
        resultBox.innerHTML = "<p class='not-found'>কোনো প্রোডাক্ট পাওয়া যায়নি</p>";
      } else {
        resultBox.innerHTML = filtered.map(item =>
          `<div class="result-item">${item}</div>`
        ).join("");
      }
    }
  </script>

</body>
</html>
